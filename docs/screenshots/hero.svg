  <text x="836" y="520" fill="#31261F" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Setup and pairing</text>
  <rect x="836" y="548" width="630" height="198" rx="28" fill="#FFFDF8"/>
  <text x="870" y="594" fill="#4A8AC8" font-family="SFMono-Regular, Menlo, monospace" font-size="18">$ npm run setup</text>
  <text x="870" y="630" fill="#5F564F" font-family="Inter, Arial, sans-serif" font-size="18">1. choose provider</text>
  <text x="870" y="660" fill="#5F564F" font-family="Inter, Arial, sans-serif" font-size="18">2. choose vault path</text>
  <text x="870" y="690" fill="#5F564F" font-family="Inter, Arial, sans-serif" font-size="18">3. name personas + emoji</text>
  <text x="870" y="720" fill="#5F564F" font-family="Inter, Arial, sans-serif" font-size="18">4. generate token + QR</text>


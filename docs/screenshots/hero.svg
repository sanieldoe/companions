  <text x="120" y="178" fill="#2F241D" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">Companions</text>
  <text x="120" y="226" fill="#655446" font-family="Inter, Arial, sans-serif" font-size="26">Four agents. One vault. Your box.</text>
  <text x="120" y="270" fill="#8C7B6E" font-family="Inter, Arial, sans-serif" font-size="18">Self-hosted AI for organisation, creativity, planning, and reflection.</text>

